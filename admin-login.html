<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VirtualMall - 管理后台登录</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            background: white;
            border-radius: 16px;
            padding: 48px 40px;
            width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            text-align: center;
        }
        .login-icon { font-size: 56px; margin-bottom: 16px; }
        .login-box h2 { font-size: 24px; color: #2d3748; margin-bottom: 8px; }
        .login-box p { font-size: 14px; color: #718096; margin-bottom: 32px; }
        .form-group { text-align: left; margin-bottom: 20px; }
        .form-group label { display: block; font-size: 14px; font-weight: 600; color: #4a5568; margin-bottom: 6px; }
        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.3s;
            outline: none;
        }
        .form-group input:focus { border-color: #667eea; }
        .login-btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.3s;
            margin-top: 8px;
        }
        .login-btn:hover { opacity: 0.9; }
        .error-msg {
            color: #e53e3e;
            font-size: 13px;
            margin-top: 12px;
            display: none;
        }
        .hint { font-size: 12px; color: #a0aec0; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="login-icon">⚡</div>
        <h2>管理后台登录</h2>
        <p>VirtualMall 商家管理系统</p>
        <form id="loginForm">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="username" placeholder="请输入用户名" value="admin">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" placeholder="请输入密码" value="admin123">
            </div>
            <button type="submit" class="login-btn">登录后台</button>
        </form>
        <div class="error-msg" id="errorMsg">用户名或密码错误</div>
        <div class="hint">默认账号：admin / admin123 &nbsp;|&nbsp; 首次使用将自动初始化数据</div>
    </div>

    <script>
        // 默认管理员账号
        const DEFAULT_ADMIN = { username: 'admin', password: 'admin123' };

        // 初始化管理员账号（首次使用时）
        if (!localStorage.getItem('vm_admin')) {
            localStorage.setItem('vm_admin', JSON.stringify(DEFAULT_ADMIN));
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            const saved = JSON.parse(localStorage.getItem('vm_admin') || '{}');

            if (user === saved.username && pass === saved.password) {
                sessionStorage.setItem('vm_logged_in', 'true');
                window.location.href = 'admin-dashboard.html';
            } else {
                const err = document.getElementById('errorMsg');
                err.style.display = 'block';
                setTimeout(() => err.style.display = 'none', 3000);
            }
        });
    </script>
</body>
</html>
